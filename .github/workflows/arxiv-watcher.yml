name: arXiv Watcher

on:
  schedule:
    # Run every Monday at 8am UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-arxiv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run arXiv watcher
        run: python scripts/arxiv_watcher.py --days 7

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/arxiv_alerts.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Sanity check diff size
        if: steps.changes.outputs.changed == 'true'
        run: |
          ALERT_COUNT=$(python -c "import json; print(len(json.load(open('src/data/arxiv_alerts.json'))['alerts']))")
          if [ "$ALERT_COUNT" -gt 200 ]; then
            echo "ERROR: Alert count ($ALERT_COUNT) exceeds safety threshold (200). Aborting."
            exit 1
          fi
          echo "Alert count: $ALERT_COUNT (within threshold)"

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "arxiv-bot"
          git config user.email "arxiv-bot@users.noreply.github.com"
          git add src/data/arxiv_alerts.json
          git commit -m "arxiv: update alerts $(date +%Y-%m-%d)"
          git push
