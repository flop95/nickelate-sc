name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run validate:data
      - run: npm run build

      - name: Stage deploy directory
        run: |
          mkdir -p _site/app
          cp -r docs/. _site/
          cp -r dist/. _site/app/
          mkdir -p _site/data/palace
          cp src/data/nickelate_dataset.json _site/data/
          cp src/data/patterns.json _site/data/
          cp src/data/predictions.json _site/data/
          cp src/data/arxiv_alerts.json _site/data/
          cp src/data/landscape.json _site/data/
          cp src/data/palace/*.json _site/data/palace/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
